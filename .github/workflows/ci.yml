name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./LendFlow

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore LendFlow.slnx

      - name: Build
        run: dotnet build LendFlow.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test LendFlow.slnx --no-build --verbosity normal
