version: '3.8'

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lendflow-sql
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1434:1433"  # mapped to host 1434 to avoid conflict
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lendflow

  redis:
    image: redis:alpine
    container_name: lendflow-redis
    ports:
      - "6380:6379"  # mapped to host 6380 to avoid conflict
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lendflow

  api:
    build:
      context: ./LendFlow
      dockerfile: LendFlow.Api/Dockerfile
    container_name: lendflow-api
    depends_on:
      sql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5147:5147"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql,1433;Database=LendFlow;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - Jwt__Key=lendflow-dev-secret-key-minimum-32-chars
      - Jwt__Issuer=lendflow
      - Jwt__Audience=lendflow-api
    networks:
      - lendflow

networks:
  lendflow:
    driver: bridge
